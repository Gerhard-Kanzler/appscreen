<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's New — App Store Screenshot Generator</title>
    <meta name="description" content="Latest features and improvements in the App Store Screenshot Generator.">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23667eea'/><rect x='20' y='30' width='60' height='45' rx='5' fill='white'/><circle cx='50' cy='20' r='5' fill='white'/></svg>">

    <link rel="stylesheet" href="styles.css">

    <script>
        // Apply saved theme preference immediately to avoid a flash
        (function () {
            const saved = localStorage.getItem('themePreference') || 'auto';
            if (saved === 'light' || saved === 'dark') {
                document.documentElement.dataset.theme = saved;
            }
        })();
    </script>
</head>
<body class="news-page">
    <header class="news-page-header">
        <a href="index.html" class="news-back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back to app
        </a>
        <h1>What's New</h1>
        <p class="news-page-subtitle">Latest features and improvements.</p>
    </header>

    <main class="news-page-main">
        <article class="news-content" id="news-content">
            <p class="news-loading">Loading…</p>
        </article>
    </main>

    <script src="news.js"></script>
    <script>
        (async function () {
            const md = await loadNewsMarkdown();
            const content = document.getElementById('news-content');
            if (md) {
                content.innerHTML = renderNewsMarkdown(md);
                localStorage.setItem('newsLastSeen', newsFingerprint(md));
            } else {
                content.innerHTML = '<p class="news-loading">Could not load news.</p>';
            }
        })();
    </script>
</body>
</html>
